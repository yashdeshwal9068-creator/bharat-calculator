<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalcMaster Pro</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    width:360px;
    background:#ffffff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

.header{
    background:linear-gradient(to right,#ff7e00,#ff3d00);
    color:white;
    padding:15px;
    font-size:18px;
    display:flex;
    justify-content:space-between;
}
.display{
    background:#1c1c1c;
    color:white;
    font-size:30px;
    text-align:right;
    padding:20px;
    height:80px;
    overflow-x:auto;
}

.buttons{
    padding:10px;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

button{
    height:55px;
    border-radius:50%;
    border:none;
    font-size:16px;
    cursor:pointer;
}

.num{ background:#f0f0f0; }
.func{ background:#e6e6e6; }
.op{ background:#ffcc80; }
.equal{ background:#ff3d00; color:white; }

button:active{
    transform:scale(0.95);
}
</style>
</head>

<body>
<div class="calculator">

<div class="header">
<span>Σ CalcMaster Pro</span>
<span>DEG</span>
</div>

<div class="display" id="display">0</div>

<div class="buttons">

<button class="func" onclick="clearDisplay()">C</button>
<button class="func" onclick="deleteLast()">⌫</button>
<button class="func" onclick="addValue('(')">(</button>
<button class="func" onclick="addValue(')')">)</button>
<button class="op" onclick="addValue('/')">÷</button>

<button class="func" onclick="sin()">sin</button>
<button class="func" onclick="cos()">cos</button>
<button class="func" onclick="tan()">tan</button>
<button class="func" onclick="log()">log</button>
<button class="op" onclick="addValue('*')">×</button>

<button class="num" onclick="addValue('7')">7</button>
<button class="num" onclick="addValue('8')">8</button>
<button class="num"

onclick="addValue('9')">9</button>
<button class="func" onclick="square()">x²</button>
<button class="op" onclick="addValue('-')">−</button>

<button class="num" onclick="addValue('4')">4</button>
<button class="num" onclick="addValue('5')">5</button>
<button class="num" onclick="addValue('6')">6</button>
<button class="func" onclick="squareRoot()">√</button>
<button class="op" onclick="addValue('+')">+</button>

<button class="num" onclick="addValue('1')">1</button>
<button class="num" onclick="addValue('2')">2</button>
<button class="num" onclick="addValue('3')">3</button>
<button class="func" onclick="addValue('Math.PI')">π</button>
<button class="equal" onclick="calculate()">=</button>

<button class="num" onclick="addValue('0')">0</button>
<button class="num" onclick="addValue('.')">.</button>
<button class="func" onclick="percentage()">%</button>
<button class="func" onclick="addValue('Math.E')">e</button>

</div>
</div>

<script>

function addValue(val){
    let display = document.getElementById("display");
    if(display.innerText === "0") display.innerText = "";
    display.innerText += val;
}

function clearDisplay(){
    document.getElementById("display").innerText = "0";
}

function deleteLast(){
    let display = document.getElementById("display");
    let text = display.innerText;
    display.innerText = text.length > 1 ? text.slice(0,-1) : "0";
}

function calculate(){
    try{
        let result = eval(document.getElementById("display").innerText);
        document.getElementById("display").innerText = result;
    }catch{
        alert("Invalid Expression");
    }
}

function square(){
    let v = parseFloat(document.getElementById("display").innerText);
    document.getElementById("display").innerText = v * v;
}

function squareRoot(){
    let v = parseFloat(document.getElementById("display").innerText);
    document.getElementById("display").innerText = Math.sqrt(v);
}

function percentage(){
    let v = parseFloat(document.getElementById("display").innerText);
    document.getElementById("display").innerText = v / 100;
}

function sin(){
    let v = parseFloat(document.getElementById("display").innerText);
    document.getElementById("display").innerText = Math.sin(v * Math.PI / 180);
}

function cos(){
    let v = parseFloat(document.getElementById("display").innerText);
    document.getElementById("display").innerText = Math.cos(v * Math.PI / 180);
}

function tan(){
    let v = parseFloat(document.getElementById("display").innerText);
    document.getElementById("display").innerText = Math.tan(v * Math.PI / 180);
}

function log(){
    let v = parseFloat(document.getElementById("display").innerText);
    document.getElementById("display").innerText = Math.log10(v);
}

</script>

</body>
</html>
