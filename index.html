<!DOCTYPE html>
<html>
<head>
<title>Bharat Pro Calculator</title>

<link rel="manifest"
href="manifest.json">
<meta name="theme-color"
content="#00ff88">
  
<style>
body{
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:monospace;
}

.calculator{
background:#111;
padding:20px;
border-radius:15px;
box-shadow:0 0 25px #00ff88;
}

#display{
width:100%;
height:60px;
margin-bottom:15px;
font-size:22px;
text-align:right;
padding:10px;
background:black;
color:#00ff88;
border:1px solid #00ff88;
border-radius:8px;
}

button{
width:65px;
height:55px;
margin:5px;
font-size:18px;
background:#000;
color:#00ff88;
border:1px solid #00ff88;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#00ff88;
color:black;
}

.row{
display:flex;
justify-content:center;
}
</style>
</head>

<body
<div class="calculator" id="calculatorSection">
<input type="text" id="display" disabled>

<div class="row">
<button onclick="clearDisplay()">C</button>
<button onclick="deleteLast()">DEL</button>
<button onclick="addValue('(')">(</button>
<button onclick="addValue(')')">)</button>
</div>

<div class="row">
<button onclick="addValue('7')">7</button>
<button onclick="addValue('8')">8</button>
<button onclick="addValue('9')">9</button>
<button onclick="addValue('/')">/</button>
</div>

<div class="row">
<button onclick="addValue('4')">4</button>
<button onclick="addValue('5')">5</button>
<button onclick="addValue('6')">6</button>
<button onclick="addValue('*')">*</button>
</div>

<div class="row">
<button onclick="addValue('1')">1</button>
<button onclick="addValue('2')">2</button>
<button onclick="addValue('3')">3</button>
<button onclick="addValue('-')">-</button>
</div>

<div class="row">
<button onclick="addValue('0')">0</button>
<button onclick="addValue('.')">.</button>
<button onclick="addSquare()">x²</button>
<button onclick="addValue('+')">+</button>
</div>

<div class="row">
<button onclick="addSqrt()">√</button>
<button onclick="addPercent()">%</button>
<button style="width:140px;" onclick="calculate()">=</button>
</div>
</div>

<script>
function addValue(val){
document.getElementById("display").value+=val;
}

function clearDisplay(){
document.getElementById("display").value="";
}

function deleteLast(){
let current=document.getElementById("display").value;
document.getElementById("display").value=current.slice(0,-1);
}

function calculate(){
try{
document.getElementById("display").value=
eval(document.getElementById("display").value);
}catch{
alert("Invalid Expression");
}
}

function addSquare(){
let current=document.getElementById("display").value;
document.getElementById("display").value=eval(current*current);
}

function addSqrt(){
let current=document.getElementById("display").value;
document.getElementById("display").value=Math.sqrt(current);
}

function addPercent(){
let current=document.getElementById("display").value;
document.getElementById("display").value=current/100;
}

document.addEventListener("keydown",function(event){
if("0123456789+-*/().".includes(event.key)){
addValue(event.key);
}
if(event.key==="Enter"){
calculate();
}
if(event.key==="Backspace"){
deleteLast();
}
});
</script>

<script>
if ('serviceworker' in navigator) {

navigator.serviceWorker.register('servic
e-worker.js');
  }
</script>
  
</body>
</html>
