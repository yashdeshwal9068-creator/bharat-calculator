<!DOCTYPE html>
<html>
<head>
<title>JEE Calculator + PYQs</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
}

.calculator {
    background: white;
    padding: 20px;
    display: inline-block;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

#display {
    width: 100%;
    height: 40px;
    margin-bottom: 10px;
    font-size: 20px;
    text-align: right;
}

button {
    width: 60px;
    height: 40px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
}
.switch-buttons {
    margin: 15px;
}
</style>
</head>

<body>

<div class="switch-buttons">
    <button onclick="showCalculator()">Calculator</button>
    <button onclick="showPYQ()">PYQs</button>
</div>

<div class="calculator" id="calculatorSection">
    <input type="text" id="display" disabled>

    <br>

    <button onclick="addValue('7')">7</button>
    <button onclick="addValue('8')">8</button>
    <button onclick="addValue('9')">9</button>
    <button onclick="addValue('/')">/</button>
    <br>
 <button onclick="addValue('4')">4</button>
    <button onclick="addValue('5')">5</button>
    <button onclick="addValue('6')">6</button>
    <button onclick="addValue('*')">*</button>
    <br>

    <button onclick="addValue('1')">1</button>
    <button onclick="addValue('2')">2</button>
    <button onclick="addValue('3')">3</button>
    <button onclick="addValue('-')">-</button>
    <br>

    <button onclick="addValue('0')">0</button>
    <button onclick="addValue('.')">.</button>
    <button onclick="calculate()">=</button>
    <button onclick="addValue('+')">+</button>
    <br>
 <button onclick="clearDisplay()">C</button>
</div>

<div id="pyqSection" style="display:none; padding:20px;">

<h2>JEE Mains & Advanced PYQs</h2>

<h3>Physics</h3>
<ul>
<li>Electrostatics – 2022 Question 1</li>
<li>Current Electricity – 2021 Question 2</li>
</ul>

<h3>Chemistry</h3>
<ul>
<li>Chemical Kinetics – 2023 Question 1</li>
<li>Electrochemistry – 2022 Question 3</li>
</ul>

<h3>Mathematics</h3>
<ul>
<li>Limits – 2021 Question 4</li>
<li>Definite Integration – 2023 Question 2</li>
</ul>

</div>

<script>
function addValue(val) {
    document.getElementById("display").value += val;
}

function clearDisplay() {
    document.getElementById("display").value = "";
}

function calculate() {
    try {
        document.getElementById("display").value =
        eval(document.getElementById("display").value);
    } catch {
        alert("Invalid Expression");
    }
}

function showCalculator() {
    document.getElementById("calculatorSection").style.display = "block";
    document.getElementById("pyqSection").style.display = "none";
}

function showPYQ() {
    document.getElementById("calculatorSection").style.display = "none"; 
document.getElementById("pyqSection").style.display = "block";
}

</script>

</body>
</html>
